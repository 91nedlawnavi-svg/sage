<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1, user-scalable=no">
<title>Sage</title>
<style>
  :root {
    --bg:        #0f0f0f;
    --bg2:       #171717;
    --bg3:       #1f1f1f;
    --bg4:       #262626;
    --border:    #2a2a2a;
    --border2:   #333333;
    --text:      #efefef;
    --muted:     #737373;
    --soft:      #a3a3a3;
    --accent-dim:#404040;
    --radius:    12px;
    --mono:      ui-monospace, 'SF Mono', 'Cascadia Code', 'Fira Code', monospace;
    --sans:      -apple-system, BlinkMacSystemFont, 'Segoe UI', system-ui, sans-serif;
  }

  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  html, body { height: 100%; }
  body {
    background: var(--bg);
    color: var(--text);
    font-family: var(--sans);
    -webkit-font-smoothing: antialiased;
  }

  #app {
    display: flex;
    flex-direction: column;
    height: 100dvh;
    max-width: 820px;
    margin: 0 auto;
    position: relative;
  }

  /* Header */
  #header {
    display: flex; align-items: center; justify-content: space-between;
    padding: 0 16px; height: 56px;
    border-bottom: 1px solid var(--border);
    background: var(--bg); flex-shrink: 0; z-index: 10;
  }
  #header-left { display: flex; align-items: center; gap: 10px; }
  #status-dot {
    width: 7px; height: 7px; border-radius: 50%;
    background: #3d8b3d; flex-shrink: 0;
    transition: background 0.3s;
  }
  #status-dot.cold { background: var(--accent-dim); }
  #header-title { font-size: 14px; font-weight: 500; color: var(--text); letter-spacing: -0.01em; }

  #menu-btn {
    background: none; border: 1px solid var(--border); color: var(--muted);
    cursor: pointer; width: 34px; height: 34px; border-radius: 8px;
    display: flex; flex-direction: column; align-items: center; justify-content: center; gap: 4px;
    transition: border-color 0.15s, background 0.15s, color 0.15s;
  }
  #menu-btn:hover { border-color: var(--border2); background: var(--bg3); color: var(--soft); }
  #menu-btn span { display: block; width: 14px; height: 1.5px; background: currentColor; border-radius: 1px; }

  /* Drawer */
  #drawer {
    position: fixed; top: 0; right: 0;
    width: min(340px, 90vw); height: 100dvh;
    background: var(--bg2); border-left: 1px solid var(--border);
    z-index: 100; transform: translateX(100%);
    transition: transform 0.22s cubic-bezier(0.4,0,0.2,1);
    display: flex; flex-direction: column;
  }
  #drawer.open { transform: translateX(0); }
  #drawer-overlay {
    position: fixed; inset: 0; background: rgba(0,0,0,0.5);
    z-index: 99; opacity: 0; pointer-events: none; transition: opacity 0.22s;
  }
  #drawer-overlay.show { opacity: 1; pointer-events: all; }
  #drawer-header {
    display: flex; align-items: center; justify-content: space-between;
    padding: 0 16px; height: 56px; border-bottom: 1px solid var(--border); flex-shrink: 0;
  }
  #drawer-header-title { font-size: 13px; font-weight: 500; color: var(--text); }
  #drawer-close {
    background: none; border: none; color: var(--muted); cursor: pointer;
    width: 28px; height: 28px; border-radius: 6px;
    display: flex; align-items: center; justify-content: center;
    transition: background 0.15s, color 0.15s;
  }
  #drawer-close:hover { background: var(--bg3); color: var(--text); }
  #drawer-close svg { width: 14px; height: 14px; }

  #drawer-tabs {
    display: flex; padding: 8px 12px 0; gap: 2px;
    border-bottom: 1px solid var(--border); flex-shrink: 0;
  }
  .drawer-tab {
    flex: 1; min-width: 0; background: none; border: none;
    padding: 6px 6px 8px; font-family: var(--sans); font-size: 11px; font-weight: 500;
    color: var(--muted); cursor: pointer; border-bottom: 2px solid transparent;
    transition: color 0.15s, border-color 0.15s; margin-bottom: -1px; white-space: nowrap;
  }
  .drawer-tab.active { color: var(--text); border-bottom-color: var(--text); }
  .drawer-tab:hover:not(.active) { color: var(--soft); }

  #drawer-content {
    flex: 1; overflow-y: auto; padding: 16px;
    font-family: var(--mono); font-size: 12px; line-height: 1.7; color: var(--soft);
  }
  #drawer-content::-webkit-scrollbar { width: 4px; }
  #drawer-content::-webkit-scrollbar-thumb { background: var(--border2); border-radius: 2px; }

  .drawer-note { color: var(--muted); font-size: 11px; margin-bottom: 14px; line-height: 1.6; }
  .entry { padding: 12px 0; border-bottom: 1px solid var(--border); }
  .entry:last-child { border-bottom: none; }
  .entry .ts { font-size: 10.5px; color: var(--accent-dim); letter-spacing: 0.03em; }
  .entry .body { margin-top: 5px; color: var(--soft); }
  .entry.reflection .body { font-style: italic; color: var(--soft); }
  .entry .src { margin-top: 7px; font-size: 10.5px; color: var(--muted); word-break: break-all; }
  .entry .src a { color: var(--muted); text-decoration: none; border-bottom: 1px solid var(--border2); }
  .entry .src a:hover { color: var(--soft); }
  .drawer-empty { color: var(--accent-dim); font-size: 12px; padding: 8px 0; }

  /* Messages */
  #messages {
    flex: 1; overflow-y: auto; padding: 24px 16px;
    display: flex; flex-direction: column; gap: 4px; scroll-behavior: smooth;
  }
  #messages::-webkit-scrollbar { width: 4px; }
  #messages::-webkit-scrollbar-thumb { background: var(--border2); border-radius: 2px; }

  .msg-group { display: flex; flex-direction: column; gap: 2px; animation: fadeUp 0.18s ease; }
  @keyframes fadeUp { from { opacity: 0; transform: translateY(6px); } to { opacity: 1; transform: translateY(0); } }
  .msg-label { font-size: 11px; font-weight: 500; padding: 0 4px; margin-bottom: 2px; color: var(--muted); }
  .msg-label.user { text-align: right; }
  .msg-label.ai { text-align: left; }

  .bubble {
    padding: 10px 14px; border-radius: var(--radius); max-width: 82%;
    word-break: break-word; font-size: 14px; line-height: 1.65; position: relative;
  }
  .bubble.user { background: var(--bg3); border: 1px solid var(--border2); margin-left: auto; border-bottom-right-radius: 3px; }
  .bubble.ai { background: var(--bg); border: 1px solid var(--border); margin-right: auto; border-bottom-left-radius: 3px; }
  .bubble.error { color: #b04545; }
  .bubble code { font-family: var(--mono); font-size: 12px; background: var(--bg3); border: 1px solid var(--border); padding: 1px 5px; border-radius: 4px; color: var(--soft); }
  .bubble pre { background: var(--bg2); border: 1px solid var(--border); border-radius: 8px; padding: 12px 14px; overflow-x: auto; margin: 8px 0; font-family: var(--mono); font-size: 12px; line-height: 1.6; }
  .bubble pre code { background: none; border: none; padding: 0; color: var(--soft); }
  .bubble strong { font-weight: 600; color: var(--text); }
  .bubble em { color: var(--soft); font-style: italic; }

  .thinking-indicator {
    display: flex; align-items: center; gap: 10px; padding: 12px 14px;
    background: var(--bg); border: 1px solid var(--border);
    border-radius: var(--radius); border-bottom-left-radius: 3px;
    width: fit-content; margin-right: auto;
  }
  .thinking-dots { display: flex; gap: 4px; align-items: center; }
  .thinking-dots span { width: 4px; height: 4px; background: var(--muted); border-radius: 50%; animation: thinkDot 1.6s ease-in-out infinite; }
  .thinking-dots span:nth-child(2) { animation-delay: 0.2s; }
  .thinking-dots span:nth-child(3) { animation-delay: 0.4s; }
  @keyframes thinkDot { 0%,60%,100% { opacity: 0.2; transform: translateY(0); } 30% { opacity: 0.9; transform: translateY(-3px); } }

  /* Input */
  #input-area { padding: 12px 16px 16px; border-top: 1px solid var(--border); background: var(--bg); flex-shrink: 0; }
  #input-row {
    display: flex; gap: 8px; align-items: flex-end;
    background: var(--bg2); border: 1px solid var(--border2); border-radius: var(--radius);
    padding: 8px 8px 8px 14px; transition: border-color 0.15s, box-shadow 0.15s;
  }
  #input-row:focus-within { box-shadow: 0 0 0 3px rgba(255,255,255,0.04); }
  #user-input {
    flex: 1; background: none; border: none; outline: none; color: var(--text);
    font-family: var(--sans); font-size: 14px; line-height: 1.55; resize: none;
    max-height: 160px; min-height: 22px; overflow-y: auto; padding: 2px 0;
  }
  #user-input::placeholder { color: var(--muted); }
  #send-btn {
    background: var(--text); border: none; color: var(--bg);
    width: 34px; height: 34px; border-radius: 50%; cursor: pointer;
    display: flex; align-items: center; justify-content: center; flex-shrink: 0;
    transition: opacity 0.15s, transform 0.1s;
  }
  #send-btn:hover { opacity: 0.88; }
  #send-btn:active { transform: scale(0.93); }
  #send-btn:disabled { opacity: 0.25; cursor: not-allowed; }
  #send-btn svg { width: 15px; height: 15px; }
  #hint { margin-top: 7px; font-size: 11px; color: var(--accent-dim); text-align: center; }

  /* Empty state */
  #empty { display: flex; flex-direction: column; align-items: center; justify-content: center; height: 100%; gap: 10px; user-select: none; }
  #empty-glyph { width: 40px; height: 40px; border: 1.5px solid var(--border2); border-radius: 10px; display: flex; align-items: center; justify-content: center; color: var(--muted); font-size: 18px; }
  #empty-title { font-size: 15px; font-weight: 500; color: var(--soft); }
  #empty-sub { font-size: 12px; color: var(--muted); }

  @media (max-width: 600px) {
    #header { padding: 0 12px; }
    #messages { padding: 16px 12px; }
    #input-area { padding: 10px 12px 14px; }
    .bubble { max-width: 92%; }
  }
</style>
</head>
<body>
<div id="app">

  <header id="header">
    <div id="header-left">
      <span id="status-dot" class="cold"></span>
      <span id="header-title">Sage</span>
    </div>
    <button id="menu-btn" aria-label="Menu" onclick="toggleDrawer()">
      <span></span><span></span><span></span>
    </button>
  </header>

  <div id="drawer-overlay" onclick="closeDrawer()"></div>

  <div id="drawer">
    <div id="drawer-header">
      <span id="drawer-header-title">Inner life</span>
      <button id="drawer-close" onclick="closeDrawer()" aria-label="Close">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><line x1="5" y1="5" x2="19" y2="19"/><line x1="19" y1="5" x2="5" y2="19"/></svg>
      </button>
    </div>
    <div id="drawer-tabs">
      <button class="drawer-tab active" data-tab="reflections" onclick="switchTab('reflections')">Reflections</button>
      <button class="drawer-tab" data-tab="findings" onclick="switchTab('findings')">Findings</button>
    </div>
    <div id="drawer-content">Loading...</div>
  </div>

  <div id="messages">
    <div id="empty">
      <div id="empty-glyph">&#9671;</div>
      <div id="empty-title">No messages yet</div>
      <div id="empty-sub">Start a conversation below</div>
    </div>
  </div>

  <div id="input-area">
    <div id="input-row">
      <textarea id="user-input" placeholder="type..." rows="1" oninput="autoResize(this)"></textarea>
      <button id="send-btn" onclick="sendMessage()" title="Send">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round">
          <line x1="22" y1="2" x2="11" y2="13"></line>
          <polygon points="22 2 15 22 11 13 2 9 22 2"></polygon>
        </svg>
      </button>
    </div>
    <div id="hint">Enter for a new line · send with the button</div>
  </div>

</div>

<script>
/* ====================================================================
   Sage frontend. Single file, no dependencies.
   Serve this from the FastAPI app on :6969 (same origin) so the /api
   calls resolve. If routes were named differently, edit CONFIG only.
   ==================================================================== */
const CONFIG = {
  API_BASE: "",                            // "" = same origin
  CHAT_ENDPOINT: "/api/chat",              // POST {message} -> {jid}
  POLL_ENDPOINT: "/api/poll",              // GET  /api/poll/{jid}?frm={offset}
  HISTORY_ENDPOINT: "/api/history",        // GET  -> {messages:[{role,content}]}
  REFLECTIONS_ENDPOINT: "/reflections?n=8",
  FINDINGS_ENDPOINT: "/findings?n=8",
  STATUS_ENDPOINT: "/health",
  POLL_INTERVAL_MS: 500,
  INNER_REFRESH_MS: 15000,
};

const api = (p) => (CONFIG.API_BASE || "") + p;
const $ = (id) => document.getElementById(id);
const messagesEl = $("messages");
let isStreaming = false;
let activeTab = "reflections";
let _pollOffset = 0;

/* ---------- markdown (minimal, same as legacy) ---------- */
function renderMarkdown(text) {
  let s = String(text)
    .replace(/&/g, "&amp;").replace(/</g, "&lt;").replace(/>/g, "&gt;");
  s = s.replace(/```[\w]*\n([\s\S]*?)```/g, (_, code) => "<pre><code>" + code.replace(/\s+$/, "") + "</code></pre>");
  s = s.replace(/`([^`]+)`/g, "<code>$1</code>");
  s = s.replace(/\*\*(.+?)\*\*/g, "<strong>$1</strong>");
  s = s.replace(/\*(.+?)\*/g, "<em>$1</em>");
  s = s.replace(/\n/g, "<br>");
  return s;
}
function escapeHtml(t) {
  return String(t).replace(/&/g, "&amp;").replace(/</g, "&lt;").replace(/>/g, "&gt;");
}

/* ---------- chat rendering ---------- */
function hideEmpty() { const e = $("empty"); if (e) e.remove(); }
function scrollBottom() { messagesEl.scrollTop = messagesEl.scrollHeight; }

function appendUser(text) {
  hideEmpty();
  const g = document.createElement("div");
  g.className = "msg-group";
  g.innerHTML = '<div class="msg-label user">You</div><div class="bubble user"></div>';
  g.querySelector(".bubble").textContent = text;
  messagesEl.appendChild(g);
  scrollBottom();
}

function createAiBubble(groupId) {
  hideEmpty();
  const g = document.createElement("div");
  g.className = "msg-group";
  g.id = groupId;
  g.innerHTML = '<div class="msg-label ai">Sage</div><div class="bubble ai" id="' + groupId + '-bubble"></div>';
  messagesEl.appendChild(g);
  scrollBottom();
  return $(groupId + "-bubble");
}

function appendTyping(id) {
  hideEmpty();
  const g = document.createElement("div");
  g.className = "msg-group";
  g.id = id;
  g.innerHTML = '<div class="thinking-indicator"><div class="thinking-dots"><span></span><span></span><span></span></div></div>';
  messagesEl.appendChild(g);
  scrollBottom();
}
function removeTyping(id) { const e = $(id); if (e) e.remove(); }

function showError(bubbleEl, msg) {
  bubbleEl.classList.add("error");
  bubbleEl.textContent = "Could not reach Sage: " + msg;
}

/* ---------- send + poll (matches legacy job/poll contract) ---------- */
async function sendMessage() {
  const ta = $("user-input");
  const text = ta.value.trim();
  if (!text || isStreaming) return;

  appendUser(text);
  ta.value = ""; autoResize(ta);

  const typingId = "typing-" + Date.now();
  appendTyping(typingId);

  isStreaming = true; setSendDisabled(true);
  const aiGroupId = "ai-" + Date.now();

  try {
    const res = await fetch(api(CONFIG.CHAT_ENDPOINT), {
      method: "POST",
      headers: { "Content-Type": "application/json" },
      body: JSON.stringify({ message: text }),
    });
    if (!res.ok) throw new Error("HTTP " + res.status);
    const data = await res.json();
    const jid = data.jid || data.job_id;
    if (jid) {
      await pollJob(jid, aiGroupId, typingId);
    } else {
      // backend answered synchronously
      removeTyping(typingId);
      const reply = typeof data === "string" ? data : (data.response || data.reply || data.message || data.text || "");
      const b = createAiBubble(aiGroupId);
      b.innerHTML = renderMarkdown(reply || "(she went quiet)");
    }
  } catch (e) {
    removeTyping(typingId);
    showError(createAiBubble(aiGroupId), e.message);
  } finally {
    isStreaming = false; setSendDisabled(false);
    $("user-input").focus();
    scrollBottom();
    if (activeTab === "reflections") loadTab("reflections");
  }
}

function pollJob(jid, aiGroupId, typingId) {
  _pollOffset = 0;
  let bubbleEl = null;
  let full = "";
  return new Promise((resolve) => {
    const tick = async () => {
      try {
        const r = await fetch(api(CONFIG.POLL_ENDPOINT) + "/" + jid + "?frm=" + _pollOffset);
        if (r.status === 404) { removeTyping(typingId); resolve(full); return; }
        const d = await r.json();

        if (d.text || d.done) {
          if ($(typingId)) removeTyping(typingId);
          if (!bubbleEl) bubbleEl = createAiBubble(aiGroupId);
        }
        if (d.text) {
          full += d.text;
          _pollOffset += (d.new_count || d.text.length);
          bubbleEl.innerHTML = renderMarkdown(full);
          scrollBottom();
        }
        if (d.done) {
          if (!full.trim() && bubbleEl) bubbleEl.textContent = "(she went quiet)";
          resolve(full); return;
        }
        setTimeout(tick, CONFIG.POLL_INTERVAL_MS);
      } catch (e) {
        removeTyping(typingId);
        if (!bubbleEl) bubbleEl = createAiBubble(aiGroupId);
        showError(bubbleEl, e.message);
        resolve(full);
      }
    };
    tick();
  });
}

function setSendDisabled(v) { $("send-btn").disabled = v; }

async function loadHistory() {
  try {
    const r = await fetch(api(CONFIG.HISTORY_ENDPOINT));
    if (!r.ok) return;
    const data = await r.json();
    const msgs = data.messages || [];
    if (!msgs.length) return;
    hideEmpty();
    msgs.forEach((m) => {
      if (m.role === "user") appendUser(m.content);
      else { const b = createAiBubble("ai-h-" + Math.random().toString(36).slice(2)); b.innerHTML = renderMarkdown(m.content); }
    });
    scrollBottom();
  } catch (e) { /* no history, fine */ }
}

/* ---------- drawer ---------- */
function toggleDrawer() { $("drawer").classList.contains("open") ? closeDrawer() : openDrawer(); }
function openDrawer() {
  $("drawer").classList.add("open");
  $("drawer-overlay").classList.add("show");
  loadTab(activeTab);
}
function closeDrawer() {
  $("drawer").classList.remove("open");
  $("drawer-overlay").classList.remove("show");
}
function switchTab(tab) {
  activeTab = tab;
  document.querySelectorAll(".drawer-tab").forEach((t) => t.classList.toggle("active", t.dataset.tab === tab));
  loadTab(tab);
}

function pick(o, keys) { for (const k of keys) if (o && o[k] != null && o[k] !== "") return o[k]; return null; }
function fmtTime(v) {
  if (v == null) return "";
  const d = typeof v === "number" ? new Date(v < 1e12 ? v * 1000 : v) : new Date(v);
  if (isNaN(d)) return String(v);
  return d.toLocaleString([], { month: "short", day: "numeric", hour: "2-digit", minute: "2-digit" });
}
function normalizeList(data, keys) {
  if (Array.isArray(data)) return data;
  for (const k of keys) if (Array.isArray(data && data[k])) return data[k];
  return [];
}

async function loadTab(tab) {
  const c = $("drawer-content");
  const isRef = tab === "reflections";
  const endpoint = isRef ? CONFIG.REFLECTIONS_ENDPOINT : CONFIG.FINDINGS_ENDPOINT;
  const note = isRef
    ? "What she has been thinking on her own. Read-only."
    : "What she went looking for, and found. Read-only.";
  try {
    const r = await fetch(api(endpoint));
    if (!r.ok) throw new Error("HTTP " + r.status);
    const data = await r.json();
    let list = normalizeList(data, [tab, "memories", "items", "results", "data"]);
    list = list.slice().reverse();
    if (tab !== activeTab) return;
    if (!list.length) { c.innerHTML = '<div class="drawer-note"></div><div class="drawer-empty">Nothing yet. Leave her idle for a while and she will wander.</div>'; c.querySelector(".drawer-note").textContent = note; return; }
    c.innerHTML = '<div class="drawer-note"></div>';
    c.querySelector(".drawer-note").textContent = note;
    for (const it of list) {
      const ts = pick(it, ["timestamp", "created_at", "created", "time", "ts", "date"]);
      const body = pick(it, ["text", "content", "body", "reflection", "finding", "query", "summary", "thought", "memory"]) || (typeof it === "string" ? it : JSON.stringify(it));
      const results = (it.results && Array.isArray(it.results) && it.results.length) ? it.results : null;
      const src = results ? null : pick(it, ["source", "url", "link", "provenance", "href"]);
      const hasSrc = results || src;
      const el = document.createElement("div");
      el.className = "entry " + (isRef ? "reflection" : "finding");
      el.innerHTML = (ts ? '<div class="ts"></div>' : "") + '<div class="body"></div>' + (hasSrc ? '<div class="src"></div>' : "");
      if (ts) el.querySelector(".ts").textContent = fmtTime(ts);
      el.querySelector(".body").textContent = body;
      if (hasSrc) {
        const srcEl = el.querySelector(".src");
        if (results) {
          srcEl.innerHTML = results.map((r) => {
            const url = r.url || r.link || r.href || "";
            const label = r.title || r.name || url;
            return url ? '<a href="' + escapeHtml(url) + '" target="_blank" rel="noopener">' + escapeHtml(label) + "</a>" : escapeHtml(label);
          }).join(" · ");
        } else {
          srcEl.innerHTML = '<a href="' + escapeHtml(src) + '" target="_blank" rel="noopener">' + escapeHtml(src) + "</a>";
        }
      }
      c.appendChild(el);
    }
  } catch (e) {
    if (tab !== activeTab) return;
    c.innerHTML = '<div class="drawer-note"></div><div class="drawer-empty"></div>';
    c.querySelector(".drawer-note").textContent = note;
    c.querySelector(".drawer-empty").textContent = isRef
      ? "Cannot read her reflections yet (" + e.message + ")."
      : "No findings feed wired up yet (" + e.message + "). Set FINDINGS_ENDPOINT in CONFIG.";
  }
}

/* ---------- status dot ---------- */
async function checkStatus() {
  try {
    const r = await fetch(api(CONFIG.STATUS_ENDPOINT));
    if (!r.ok) throw new Error();
    $("status-dot").classList.remove("cold");
  } catch {
    // fall back to history endpoint as a liveness probe
    try { const r2 = await fetch(api(CONFIG.HISTORY_ENDPOINT)); $("status-dot").classList.toggle("cold", !r2.ok); }
    catch { $("status-dot").classList.add("cold"); }
  }
}

/* ---------- input ---------- */
function autoResize(el) { el.style.height = "auto"; el.style.height = Math.min(el.scrollHeight, 160) + "px"; }

/* ---------- boot ---------- */
loadHistory();
checkStatus();
