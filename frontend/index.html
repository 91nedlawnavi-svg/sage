<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Sage</title>
<style>
:root{
  --bg:#121110;--bg2:#191816;--bg3:#211f1d;--border:#272522;--border2:#33302c;
  --text:#ece8e1;--soft:#a7a199;--muted:#736d64;--faint:#4a443c;
  --accent:#cfcbc4;--accent-dim:#5c574f;--err:#c06a5a;
  --radius:14px;
  --sans:-apple-system,BlinkMacSystemFont,'Segoe UI',system-ui,sans-serif;
  --mono:ui-monospace,'SF Mono','Cascadia Code','Fira Code',monospace;
}
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0;}
/* Button polish: tap-highlight, focus ring, corners */
button,[role="button"]{-webkit-tap-highlight-color:transparent;user-select:none;border-radius:8px;}
button:focus:not(:focus-visible),[role="button"]:focus:not(:focus-visible){outline:none;}
button:focus-visible,[role="button"]:focus-visible{outline:2px solid var(--accent);outline-offset:2px;}
html,body{height:100%;}
body{background:var(--bg);color:var(--text);font-family:var(--sans);line-height:1.6;-webkit-font-smoothing:antialiased;}
#app{display:flex;flex-direction:column;height:100dvh;max-width:760px;margin:0 auto;position:relative;}

#header{display:flex;align-items:center;justify-content:space-between;height:60px;padding:0 20px;flex-shrink:0;border-bottom:1px solid var(--border);}
#header-left{display:flex;align-items:center;gap:11px;}
#status-dot{width:8px;height:8px;border-radius:50%;background:var(--accent);position:relative;transition:background .25s;}
#status-dot::after{content:'';position:absolute;inset:-5px;border-radius:50%;background:var(--accent);animation:pulse 1.9s cubic-bezier(.4,0,.6,1) infinite;}
#status-dot.cold{background:var(--faint);}
#status-dot.cold::after{display:none;}
#status-dot.down{background:var(--err);}
#status-dot.down::after{background:var(--err);animation-duration:.95s;}
@keyframes pulse{0%{transform:scale(.5);opacity:.6;}70%,100%{transform:scale(1.8);opacity:0;}}
#header-title{font-size:14.5px;font-weight:600;letter-spacing:-0.01em;}
#inner-toggle{display:flex;align-items:center;gap:8px;background:none;border:1px solid var(--border);color:var(--muted);font-family:inherit;font-size:12.5px;padding:6px 12px;border-radius:999px;cursor:pointer;transition:all .15s;}
#inner-toggle:hover{border-color:var(--border2);color:var(--soft);}
#inner-dot{width:5px;height:5px;border-radius:50%;background:var(--faint);transition:background .3s,box-shadow .3s;}
#inner-toggle.has-new #inner-dot{background:var(--accent);box-shadow:0 0 8px var(--accent-dim);}

#messages{flex:1;overflow-y:auto;padding:28px 20px;display:flex;flex-direction:column;gap:22px;scroll-behavior:smooth;}
#messages::-webkit-scrollbar{width:5px;}
#messages::-webkit-scrollbar-thumb{background:var(--border2);border-radius:3px;}
.msg{display:flex;flex-direction:column;animation:rise .2s ease;}
@keyframes rise{from{opacity:0;transform:translateY(5px);}to{opacity:1;transform:translateY(0);}}
.msg.user{align-items:flex-end;}
.msg.ai{align-items:flex-start;}
.msg.user .bubble{background:var(--bg3);border:1px solid var(--border);border-radius:var(--radius);border-bottom-right-radius:4px;padding:10px 15px;max-width:80%;}
.msg.ai .bubble{background:var(--bg2);border:1px solid var(--border);border-radius:var(--radius);border-bottom-left-radius:4px;padding:10px 15px;max-width:82%;}
.bubble{font-size:14.5px;line-height:1.7;word-break:break-word;}
.bubble.error{color:var(--err);}
.bubble strong{font-weight:400;color:var(--text);}
.bubble em{color:var(--soft);}
.bubble code{font-family:var(--mono);font-size:12.5px;background:var(--bg3);border:1px solid var(--border);border-radius:5px;padding:1px 6px;}
.bubble pre{background:var(--bg2);border:1px solid var(--border);border-radius:10px;padding:13px 15px;margin:10px 0;overflow-x:auto;}
.bubble pre code{background:none;border:none;padding:0;color:var(--soft);font-size:12.5px;line-height:1.6;}
.bubble.streaming::after{content:'';display:inline-block;width:6px;height:1em;margin-left:3px;background:var(--accent);border-radius:1px;vertical-align:-0.12em;opacity:.65;animation:caret 1.05s steps(1) infinite;}
@keyframes caret{0%,50%{opacity:.65;}50.01%,100%{opacity:0;}}
.thinking{display:flex;gap:5px;align-items:center;padding:4px 1px;}
.thinking span{width:5px;height:5px;border-radius:50%;background:var(--muted);animation:tdot 1.5s ease-in-out infinite;}
.thinking span:nth-child(2){animation-delay:.2s;}
.thinking span:nth-child(3){animation-delay:.4s;}
@keyframes tdot{0%,60%,100%{opacity:.2;transform:translateY(0);}30%{opacity:.85;transform:translateY(-3px);}}
#empty{margin:auto;display:flex;flex-direction:column;align-items:center;gap:12px;user-select:none;}
#empty-glyph{font-size:26px;color:var(--faint);}
#empty-sub{font-size:13px;color:var(--muted);}

#input-area{flex-shrink:0;padding:8px 20px 18px;}
#input-row{display:flex;align-items:flex-end;gap:8px;background:var(--bg2);border:1px solid var(--border2);border-radius:var(--radius);padding:9px 9px 9px 16px;transition:border-color .15s,box-shadow .15s;}
#input-row:focus-within{border-color:var(--border2);box-shadow:0 0 0 3px rgba(255,255,255,.05);}
#user-input{flex:1;background:none;border:none;outline:none;resize:none;color:var(--text);font-family:inherit;font-size:14.5px;line-height:1.6;max-height:170px;min-height:23px;padding:2px 0;}
#user-input::placeholder{color:var(--muted);}
#send-btn{flex-shrink:0;width:34px;height:34px;border-radius:50%;border:none;background:var(--bg3);color:var(--muted);cursor:pointer;display:flex;align-items:center;justify-content:center;transition:all .15s;}
#send-btn:hover:not(:disabled){background:var(--accent);color:var(--bg);}
#send-btn:active:not(:disabled){transform:scale(.92);}
#send-btn:disabled{opacity:.4;cursor:default;}
#send-btn svg{width:17px;height:17px;}
#hint{text-align:center;font-size:11px;color:var(--faint);margin-top:9px;height:13px;opacity:0;transition:opacity .2s;}
#input-row:focus-within ~ #hint{opacity:1;}

#drawer-overlay{position:fixed;inset:0;background:rgba(0,0,0,.55);opacity:0;pointer-events:none;transition:opacity .25s;z-index:40;}
#drawer-overlay.show{opacity:1;pointer-events:auto;}
#drawer{position:fixed;top:0;right:0;height:100dvh;width:min(380px,92vw);background:var(--bg2);border-left:1px solid var(--border);z-index:50;transform:translateX(100%);transition:transform .26s cubic-bezier(.4,0,.2,1);display:flex;flex-direction:column;}
#drawer.open{transform:translateX(0);}
#drawer-header{display:flex;align-items:center;justify-content:space-between;height:60px;padding:0 18px;flex-shrink:0;border-bottom:1px solid var(--border);}
#drawer-title{font-size:13.5px;font-weight:600;}
#drawer-close{background:none;border:none;color:var(--muted);font-size:15px;width:30px;height:30px;border-radius:7px;cursor:pointer;transition:all .15s;}
#drawer-close:hover{background:var(--bg3);color:var(--text);}
#drawer-tabs{display:flex;gap:4px;padding:12px 16px 0;flex-shrink:0;}
.drawer-tab{flex:1;background:none;border:none;border-bottom:2px solid transparent;color:var(--muted);font-family:inherit;font-size:12px;font-weight:500;padding:7px 0 9px;cursor:pointer;transition:all .15s;}
.drawer-tab.active{color:var(--text);border-bottom-color:var(--accent);}
.drawer-tab:hover:not(.active){color:var(--soft);}
#drawer-note{padding:12px 18px 0;font-size:11px;color:var(--muted);line-height:1.55;flex-shrink:0;}
#drawer-content{flex:1;overflow-y:auto;padding:14px 18px 20px;}
#drawer-content::-webkit-scrollbar{width:5px;}
#drawer-content::-webkit-scrollbar-thumb{background:var(--border2);border-radius:3px;}
.entry{padding:13px 0;border-bottom:1px solid var(--border);}
.entry:last-child{border-bottom:none;}
.entry .ts{font-size:10.5px;color:var(--accent-dim);letter-spacing:.03em;text-transform:uppercase;}
.entry .body{margin-top:6px;font-size:13px;line-height:1.65;color:var(--soft);}
.entry.reflection{padding-left:11px;border-left:2px solid var(--border2);}
.entry .src{margin-top:8px;font-size:11px;line-height:1.6;}
.entry .src a{color:var(--muted);text-decoration:none;border-bottom:1px solid var(--border2);}
.entry .src a:hover{color:var(--accent);}
.drawer-empty{color:var(--faint);font-size:12.5px;padding:10px 0;}

@media(max-width:600px){
  #header{padding:0 14px;}
  #messages{padding:18px 14px;}
  #input-area{padding:6px 14px 14px;}
  .msg.user .bubble{max-width:88%;}
}
/* Graph tab (brain-authored, warm monochrome) */
#sg-inner-graph{display:none;flex-direction:column;flex:1;min-height:0;overflow:hidden;padding:14px 18px 20px;position:relative;}
#sg-graph-top{display:flex;align-items:flex-start;gap:8px;margin-bottom:8px;flex:0 0 auto;}
#sg-graph-chips{display:flex;gap:6px;flex-wrap:wrap;flex:1;}
#sg-graph-actions{display:flex;gap:6px;align-items:center;flex-shrink:0;}
#sg-graph-svg{width:100%;flex:1 1 auto;min-height:0;display:block;cursor:grab;}
#sg-graph-svg:active{cursor:grabbing;}
#sg-graph-refresh,#sg-review-toggle{background:none;border:1px solid var(--border2);color:var(--muted);border-radius:8px;height:28px;cursor:pointer;font:inherit;font-size:11.5px;display:flex;align-items:center;gap:5px;justify-content:center;flex-shrink:0;line-height:1;transition:all .15s;}
#sg-graph-refresh{width:28px;font-size:14px;}
#sg-review-toggle{padding:0 10px;}
#sg-graph-refresh:hover,#sg-review-toggle:hover{color:var(--soft);border-color:var(--accent-dim);}
#drawer-header-left{display:flex;align-items:baseline;gap:18px;min-width:0;}
#clear-chat-btn{background:none;border:none;color:var(--muted);font-family:inherit;font-size:11px;font-weight:500;letter-spacing:.02em;cursor:pointer;padding:0;line-height:1;transition:color .15s;}
#clear-chat-btn:hover{color:var(--soft);}
#sg-review-toggle .sg-rev-badge{background:var(--accent-dim);color:var(--bg);border-radius:999px;font-size:10px;padding:1px 6px;line-height:1.25;min-width:18px;text-align:center;}
#sg-review-toggle.on{color:var(--text);border-color:var(--accent-dim);background:var(--bg3);}
#sg-graph-error{display:none;flex:1;align-items:center;justify-content:center;color:var(--muted);font-size:13px;text-align:center;padding:0 20px;}
#sg-graph-error a{color:var(--accent);text-decoration:none;}
/* Inspector (click-to-curate) */
#sg-inspector{display:none;border-top:1px solid var(--border);background:var(--bg2);padding:10px 14px 12px;flex:0 0 auto;}
#sg-inspector.open{display:block;}
.sg-insp-head{display:flex;align-items:center;gap:8px;font-size:12px;font-weight:600;color:var(--text);margin-bottom:6px;}
.sg-insp-head .sg-insp-close{margin-left:auto;background:none;border:none;color:var(--muted);cursor:pointer;font-size:14px;line-height:1;}
.sg-insp-head .sg-insp-kind{font-weight:400;font-size:11px;color:var(--muted);}
.sg-insp-body{font-size:11.5px;color:var(--soft);line-height:1.55;}
.sg-insp-row{margin-top:1px;}
.sg-insp-row span{color:var(--muted);display:inline-block;min-width:70px;}
.sg-insp-actions{display:flex;gap:6px;margin-top:9px;flex-wrap:wrap;}
.sg-insp-actions button{background:var(--bg3);border:1px solid var(--border2);color:var(--soft);font:inherit;font-size:11px;padding:4px 11px;border-radius:7px;cursor:pointer;transition:all .15s;}
.sg-insp-actions button:hover:not(:disabled){border-color:var(--accent-dim);color:var(--text);}
.sg-insp-actions button:disabled{opacity:.4;cursor:default;}
.sg-insp-actions button.sg-danger:hover:not(:disabled){border-color:var(--err);color:var(--err);}
.sg-insp-fix{display:none;margin-top:8px;gap:5px;flex-wrap:wrap;align-items:center;font-size:11px;}
.sg-insp-fix.show{display:flex;}
.sg-insp-fix input,.sg-insp-fix select{background:var(--bg3);border:1px solid var(--border2);color:var(--text);border-radius:6px;font:inherit;font-size:11px;padding:4px 7px;}
.sg-insp-fix input{flex:1;min-width:130px;}
.sg-insp-status{margin-top:6px;font-size:10.5px;color:var(--muted);min-height:14px;}
.sg-insp-status.err{color:var(--err);}
/* Review queue panel */
#sg-review{display:none;position:absolute;top:48px;right:14px;width:320px;max-width:92%;max-height:calc(100% - 70px);background:var(--bg2);border:1px solid var(--border2);border-radius:10px;flex-direction:column;z-index:6;box-shadow:0 14px 32px rgba(0,0,0,.45);overflow:hidden;}
#sg-review.open{display:flex;}
#sg-review-head{padding:9px 12px;border-bottom:1px solid var(--border);display:flex;align-items:center;justify-content:space-between;gap:8px;flex-shrink:0;}
#sg-review-tabs{display:flex;gap:4px;}
.sg-rev-tab{background:none;border:1px solid var(--border2);color:var(--muted);font:inherit;font-size:10.5px;padding:3px 9px;border-radius:999px;cursor:pointer;transition:all .15s;}
.sg-rev-tab.active{color:var(--text);border-color:var(--accent-dim);background:var(--bg3);}
#sg-review-close{background:none;border:none;color:var(--muted);cursor:pointer;font-size:14px;line-height:1;}
#sg-review-filters{padding:7px 12px;border-bottom:1px solid var(--border);display:flex;gap:5px;align-items:center;flex-wrap:wrap;font-size:10.5px;color:var(--muted);flex-shrink:0;}
#sg-review-filters select,#sg-review-filters input{background:var(--bg3);border:1px solid var(--border2);color:var(--text);border-radius:6px;font:inherit;font-size:10.5px;padding:3px 6px;}
#sg-review-filters input{width:62px;}
#sg-review-list{overflow-y:auto;padding:4px 0;flex:1;}
#sg-review-list::-webkit-scrollbar{width:5px;}
#sg-review-list::-webkit-scrollbar-thumb{background:var(--border2);border-radius:3px;}
.sg-rev-item{padding:8px 12px;border-bottom:1px solid var(--border);cursor:pointer;}
.sg-rev-item:last-child{border-bottom:none;}
.sg-rev-item:hover{background:var(--bg3);}
.sg-rev-edge{font-size:12px;line-height:1.45;color:var(--soft);word-break:break-word;}
.sg-rev-edge .sg-rev-pred{color:var(--text);}
.sg-rev-meta{margin-top:3px;font-size:10px;color:var(--muted);display:flex;gap:8px;align-items:center;}
.sg-rev-meta .sg-rev-cat{width:6px;height:6px;border-radius:50%;display:inline-block;}
.sg-rev-actions{display:flex;gap:5px;margin-top:6px;}
.sg-rev-actions button{background:var(--bg3);border:1px solid var(--border2);color:var(--soft);font:inherit;font-size:10.5px;padding:3px 9px;border-radius:6px;cursor:pointer;transition:all .15s;}
.sg-rev-actions button:hover:not(:disabled){border-color:var(--accent-dim);color:var(--text);}
.sg-rev-actions button:disabled{opacity:.45;cursor:default;}
.sg-rev-actions button.sg-danger:hover:not(:disabled){border-color:var(--err);color:var(--err);}
.sg-rev-empty{padding:18px 12px;color:var(--faint);font-size:12px;text-align:center;}
.sg-shape{fill:var(--bg3);stroke:var(--soft);stroke-width:1.5px;cursor:pointer;transition:stroke .15s;}
.sg-node:hover .sg-shape{stroke:var(--accent);}
.sg-ego-ring{fill:none;stroke:var(--accent);stroke-width:1.4px;opacity:.7;}
.sg-label{fill:var(--soft);font-size:11px;font-family:var(--sans);paint-order:stroke;stroke:var(--bg);stroke-width:3px;stroke-linejoin:round;pointer-events:none;}
.sg-link{stroke-opacity:.5;stroke-linecap:round;}
.sg-lock{font-size:9px;pointer-events:none;}
.sg-chip{background:none;border:1px solid var(--border2);color:var(--muted);font-family:var(--sans);font-size:11px;padding:4px 11px;border-radius:999px;cursor:pointer;display:inline-flex;align-items:center;gap:6px;transition:all .15s;}
.sg-chip::before{content:'';width:7px;height:7px;border-radius:50%;background:var(--cc);}
.sg-chip:not(.off){color:var(--soft);border-color:var(--cc);}
.sg-chip.off{opacity:.4;}
#sg-graph-tooltip{position:fixed;pointer-events:none;display:none;background:var(--bg2);color:var(--text);border:1px solid var(--border2);border-radius:10px;padding:9px 12px;font-size:12px;max-width:248px;line-height:1.5;z-index:9999;box-shadow:0 8px 24px rgba(0,0,0,.45);}
.sg-tip-title{font-weight:600;font-size:12.5px;margin-bottom:5px;}
.sg-tip-type{color:var(--muted);font-weight:400;font-size:11px;}
.sg-tip-row span,.sg-tip-fact span{color:var(--muted);display:inline-block;min-width:76px;}
.sg-tip-fact{margin-top:2px;}
.sg-tip-row{margin-top:1px;}
.sg-tip-lock{color:var(--accent);}
.sg-tip-empty{color:var(--faint);}
</style>
</head>
<body>
<div id="app">
  <header id="header">
    <div id="header-left">
      <span id="status-dot" class="cold" title="connecting"></span>
      <span id="header-title">Sage</span>
    </div>
    <div style="display:flex;align-items:center;gap:6px;">
      <button id="inner-toggle" aria-label="Notebook">
        <span id="inner-dot"></span>
        <span>Notebook</span>
      </button>
    </div>
  </header>

  <main id="messages">
    <div id="empty">
      <div id="empty-glyph">&#9671;</div>
      <div id="empty-sub">Begin when you're ready.</div>
    </div>
  </main>

  <div id="input-area">
    <div id="input-row">
      <textarea id="user-input" rows="1" placeholder="Message Sage"></textarea>
      <button id="send-btn" aria-label="Send">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M5 12h14M13 6l6 6-6 6" stroke-linecap="round" stroke-linejoin="round"/></svg>
      </button>
    </div>
    <div id="hint">Enter for a new line &middot; Cmd / Ctrl + Enter to send</div>
  </div>
</div>

<div id="drawer-overlay"></div>
<aside id="drawer">
  <div id="drawer-header">
    <div id="drawer-header-left">
      <span id="drawer-title">Notebook</span>
      <button id="clear-chat-btn" type="button" aria-label="Clear chat view — history stays saved" title="Clear chat view — history stays saved">Clear Chat</button>
    </div>
    <button id="drawer-close" aria-label="Close">&#10005;</button>
  </div>
  <div id="drawer-tabs">
    <button class="drawer-tab active" data-tab="reflections">Reflections</button>
    <button class="drawer-tab" data-tab="findings">Findings</button>
    <button class="drawer-tab" data-tab="graph">Graph</button>
  </div>
  <div id="drawer-note"></div>
  <div id="drawer-content">Loading</div>
  <div id="sg-inner-graph">
    <div id="sg-graph-top">
      <div id="sg-graph-chips"></div>
      <div id="sg-graph-actions">
        <button id="sg-review-toggle" type="button" title="Review queue">Review <span class="sg-rev-badge" id="sg-review-badge">0</span></button>
        <button id="sg-graph-refresh" title="Refresh">&#8635;</button>
      </div>
    </div>
    <svg id="sg-graph-svg"></svg>
    <div id="sg-graph-error"></div>
    <div id="sg-inspector"></div>
    <div id="sg-review">
      <div id="sg-review-head">
        <div id="sg-review-tabs">
          <button class="sg-rev-tab active" data-state="pending" type="button">Pending</button>
          <button class="sg-rev-tab" data-state="confirmed" type="button">Confirmed</button>
          <button class="sg-rev-tab" data-state="dismissed" type="button">Dismissed</button>
        </div>
        <button id="sg-review-close" title="Close" type="button">&#10005;</button>
      </div>
      <div id="sg-review-filters">
        <select id="sg-review-cat"><option value="">all cats</option></select>
        <input id="sg-review-min" type="text" placeholder="min" inputmode="decimal">
        <input id="sg-review-max" type="text" placeholder="max" inputmode="decimal">
        <input id="sg-review-endp" type="text" placeholder="endpoint id" style="width:auto;flex:1;min-width:90px;">
      </div>
      <div id="sg-review-list"><div class="sg-rev-empty">Loading…</div></div>
    </div>
  </div>
</aside>

<div id="sg-graph-tooltip"></div>

<script src="https://d3js.org/d3.v7.min.js"></script>
<script>
/* === Sage people-graph core (brain-authored) === */
/* Sage people-graph - brain-authored graph layer (warm monochrome).
   Classic browser script. Requires global d3 (v7). No build step.
   Exposes window.initSageGraph(opts) -> controller { reload, refit, stop, resume }. */
(function (global) {
  "use strict";

  var CATEGORY_COLORS = {
    family: "#c98a6f",
    friend: "#8ca37e",
    romantic: "#c08aa0",
    colleague: "#7f93a8",
    acquaintance: "#9a8d86",
    creator: "#c2a15e",
    other: "#857c73"
  };
  var CATEGORY_ORDER = ["family", "friend", "romantic", "colleague", "acquaintance", "creator", "other"];

  function catColor(c) { return CATEGORY_COLORS[c] || CATEGORY_COLORS.other; }
  function clamp(v, a, b) { return Math.max(a, Math.min(b, v)); }
  function esc(s) { return String(s == null ? "" : s).replace(/&/g, "&amp;").replace(/</g, "&lt;").replace(/>/g, "&gt;"); }

  function initSageGraph(opts) {
    var d3 = global.d3;
    if (!d3) { return null; }

    var svgEl = opts.svg;
    var chipsEl = opts.chips;
    var tooltipEl = opts.tooltip;
    var getData = opts.getData;
    var egoId = opts.egoId || "person:elliot";
    var onSelect = typeof opts.onSelect === "function" ? opts.onSelect : null;

    var svg = d3.select(svgEl);
    svg.selectAll("*").remove();

    var defs = svg.append("defs");
    var zoomG = svg.append("g").attr("class", "sg-zoom");
    var linkLayer = zoomG.append("g");
    var lockLayer = zoomG.append("g");
    var nodeLayer = zoomG.append("g");

    var nodes = [], links = [];
    var active = {};
    var simulation = null;
    var W = 1, H = 1;
    var nodeSel, linkSel, lockSel;

    var zoom = d3.zoom().scaleExtent([0.4, 2.5]).on("zoom", function (ev) {
      zoomG.attr("transform", ev.transform);
    });
    svg.call(zoom).on("dblclick.zoom", null);

    function nodeRadius(d) { return d.id === egoId ? 10 : 8; }

    function ensureMarkers(cats) {
      cats.forEach(function (c) {
        if (defs.select("#sg-arrow-" + c).size()) return;
        var m = defs.append("marker")
          .attr("id", "sg-arrow-" + c)
          .attr("viewBox", "0 0 8 8")
          .attr("refX", 6).attr("refY", 4)
          .attr("markerWidth", 6).attr("markerHeight", 6)
          .attr("markerUnits", "userSpaceOnUse")
          .attr("orient", "auto");
        m.append("path").attr("d", "M0,0 L8,4 L0,8 Z").attr("fill", catColor(c));
      });
    }

    function measure(cb, tries) {
      tries = tries || 0;
      requestAnimationFrame(function () {
        requestAnimationFrame(function () {
          var w = svgEl.clientWidth, h = svgEl.clientHeight;
          if ((w <= 1 || h <= 1) && tries < 30) { measure(cb, tries + 1); return; }
          W = w > 1 ? w : 360; H = h > 1 ? h : 460;
          cb();
        });
      });
    }

    function shapeFor(sel) {
      sel.each(function (d) {
        var g = d3.select(this);
        var r = nodeRadius(d);
        if (d.id === egoId) {
          g.append("circle").attr("class", "sg-ego-ring").attr("r", r + 4);
        }
        if (d.type === "place") {
          g.append("path").attr("class", "sg-shape").attr("d", "M0," + (-r) + " L" + r + ",0 L0," + r + " L" + (-r) + ",0 Z");
        } else if (d.type === "project") {
          g.append("rect").attr("class", "sg-shape").attr("x", -r).attr("y", -r * 0.82).attr("width", 2 * r).attr("height", 1.64 * r).attr("rx", 3);
        } else {
          g.append("circle").attr("class", "sg-shape").attr("r", r);
        }
        g.append("text").attr("class", "sg-label").attr("y", r + 13).attr("text-anchor", "middle").text(d.name || d.id);
      });
    }

    function neighborsOf(id) {
      var s = {}; s[id] = true;
      links.forEach(function (l) {
        var sid = l.source.id || l.source, tid = l.target.id || l.target;
        if (sid === id) s[tid] = true;
        if (tid === id) s[sid] = true;
      });
      return s;
    }

    function dimExcept(keepNodes, keepLink) {
      nodeSel.style("opacity", function (d) { return keepNodes[d.id] ? 1 : 0.12; });
      linkSel.style("opacity", function (l) { return keepLink(l) ? 0.9 : 0.06; });
      lockSel.style("opacity", function (l) { return keepLink(l) ? 1 : 0.06; });
    }
    function undim() {
      nodeSel.style("opacity", 1);
      linkSel.style("opacity", null);
      lockSel.style("opacity", null);
    }

    function visible(l) { return active[l.category] !== false; }

    function applyFilter() {
      var vis = {};
      links.forEach(function (l) {
        if (visible(l)) { vis[l.source.id || l.source] = true; vis[l.target.id || l.target] = true; }
      });
      nodeSel.attr("display", function (d) { return vis[d.id] ? null : "none"; });
      linkSel.attr("display", function (l) { return visible(l) ? null : "none"; });
      lockSel.attr("display", function (l) { return (visible(l) && l.locked) ? null : "none"; });
    }

    function buildChips(cats) {
      chipsEl.innerHTML = "";
      cats.forEach(function (c) {
        var b = document.createElement("button");
        b.className = "sg-chip";
        b.style.setProperty("--cc", catColor(c));
        b.textContent = c;
        b.setAttribute("data-cat", c);
        if (active[c] === false) b.classList.add("off");
        b.addEventListener("click", function () {
          active[c] = (active[c] === false);
          b.classList.toggle("off", active[c] === false);
          applyFilter();
        });
        chipsEl.appendChild(b);
      });
    }

    function tooltipHtml(kind, d) {
      if (kind === "node") {
        var facts = d.facts || [];
        var lines = facts.map(function (f) {
          return '<div class="sg-tip-fact"><span>' + esc(f.predicate) + '</span> ' + esc(f.value) + (f.locked ? ' <span class="sg-tip-lock">locked</span>' : '') + '</div>';
        }).join("");
        return '<div class="sg-tip-title">' + esc(d.name || d.id) + ' <span class="sg-tip-type">' + esc(d.type || "") + '</span></div>' + (lines || '<div class="sg-tip-empty">no facts</div>');
      }
      var l = d;
      return '<div class="sg-tip-title">' + esc(l.source.name || l.source.id) + ' &rarr; ' + esc(l.target.name || l.target.id) + '</div>' +
        '<div class="sg-tip-row"><span>predicate</span> ' + esc(l.predicate) + '</div>' +
        '<div class="sg-tip-row"><span>category</span> ' + esc(l.category) + '</div>' +
        '<div class="sg-tip-row"><span>confidence</span> ' + (l.confidence != null ? Number(l.confidence).toFixed(2) : "-") + '</div>' +
        (l.locked ? '<div class="sg-tip-row sg-tip-lock">locked</div>' : '');
    }
    function showTip(html, ev) { tooltipEl.innerHTML = html; tooltipEl.style.display = "block"; moveTip(ev); }
    function moveTip(ev) { tooltipEl.style.left = (ev.clientX + 14) + "px"; tooltipEl.style.top = (ev.clientY + 14) + "px"; }
    function hideTip() { tooltipEl.style.display = "none"; }

    function linkPath(l) {
      var s = l.source, t = l.target;
      var dx = t.x - s.x, dy = t.y - s.y;
      var dist = Math.sqrt(dx * dx + dy * dy) || 1;
      var ux = dx / dist, uy = dy / dist;
      var sr = nodeRadius(s) + 2, tr = nodeRadius(t) + 8;
      var sx = s.x + ux * sr, sy = s.y + uy * sr;
      var ex = t.x - ux * tr, ey = t.y - uy * tr;
      if (!l._curve) {
        l._mx = (sx + ex) / 2; l._my = (sy + ey) / 2;
        return "M" + sx + "," + sy + "L" + ex + "," + ey;
      }
      var mx = (sx + ex) / 2, my = (sy + ey) / 2;
      var cx = mx + (-uy) * l._curve, cy = my + (ux) * l._curve;
      l._mx = 0.25 * sx + 0.5 * cx + 0.25 * ex;
      l._my = 0.25 * sy + 0.5 * cy + 0.25 * ey;
      return "M" + sx + "," + sy + "Q" + cx + "," + cy + " " + ex + "," + ey;
    }

    function ticked() {
      linkSel.attr("d", linkPath);
      lockSel.attr("transform", function (l) { return "translate(" + (l._mx || 0) + "," + (l._my || 0) + ")"; });
      nodeSel.attr("transform", function (d) { return "translate(" + d.x + "," + d.y + ")"; });
    }

    function fitToView() {
      if (!nodes.length) return;
      var minX = Infinity, minY = Infinity, maxX = -Infinity, maxY = -Infinity;
      nodes.forEach(function (d) {
        if (d.x < minX) minX = d.x; if (d.x > maxX) maxX = d.x;
        if (d.y < minY) minY = d.y; if (d.y > maxY) maxY = d.y;
      });
      var pad = 46;
      var bw = Math.max(1, maxX - minX), bh = Math.max(1, maxY - minY);
      var scale = clamp(Math.min((W - 2 * pad) / bw, (H - 2 * pad) / bh), 0.4, 2.0);
      var cx = (minX + maxX) / 2, cy = (minY + maxY) / 2;
      var tx = W / 2 - scale * cx, ty = H / 2 - scale * cy;
      svg.transition().duration(450).call(zoom.transform, d3.zoomIdentity.translate(tx, ty).scale(scale));
    }

    function assignCurves() {
      var groups = {};
      links.forEach(function (l) {
        var a = (l.source.id || l.source), b = (l.target.id || l.target);
        var key = [a, b].sort().join("|");
        (groups[key] = groups[key] || []).push(l);
      });
      Object.keys(groups).forEach(function (k) {
        var g = groups[k], n = g.length;
        g.forEach(function (l, i) { l._curve = n === 1 ? 0 : (i - (n - 1) / 2) * 26; });
      });
    }

    function build() {
      var cats = {};
      links.forEach(function (l) { cats[l.category] = true; });
      var catList = CATEGORY_ORDER.filter(function (c) { return cats[c]; });
      Object.keys(cats).forEach(function (c) { if (catList.indexOf(c) < 0) catList.push(c); });
      catList.forEach(function (c) { if (active[c] === undefined) active[c] = true; });

      ensureMarkers(catList);
      buildChips(catList);
      assignCurves();

      linkSel = linkLayer.selectAll("path").data(links).join("path")
        .attr("class", "sg-link")
        .attr("stroke", function (l) { return catColor(l.category); })
        .attr("stroke-width", function (l) { return l.locked ? 2.25 : 1.4; })
        .attr("marker-end", function (l) { return "url(#sg-arrow-" + l.category + ")"; })
        .attr("fill", "none")
        .style("cursor", onSelect ? "pointer" : null)
        .on("mouseover", function (ev, l) { showTip(tooltipHtml("edge", l), ev); var k = {}; k[l.source.id] = true; k[l.target.id] = true; dimExcept(k, function (x) { return x === l; }); })
        .on("mousemove", function (ev) { moveTip(ev); })
        .on("mouseout", function () { hideTip(); undim(); })
        .on("click", function (ev, l) { if (onSelect) { ev.stopPropagation(); onSelect("edge", l); } });

      lockSel = lockLayer.selectAll("text").data(links.filter(function (l) { return l.locked; })).join("text")
        .attr("class", "sg-lock").attr("text-anchor", "middle").attr("dy", "0.32em").text("\uD83D\uDD12");

      nodeSel = nodeLayer.selectAll("g.sg-node").data(nodes).join(function (enter) {
        var g = enter.append("g").attr("class", "sg-node");
        shapeFor(g);
        return g;
      });

      nodeSel.call(d3.drag()
        .on("start", function (ev, d) { if (!ev.active) simulation.alphaTarget(0.25).restart(); d.fx = d.x; d.fy = d.y; if (ev.sourceEvent) ev.sourceEvent.stopPropagation(); })
        .on("drag", function (ev, d) { d.fx = ev.x; d.fy = ev.y; })
        .on("end", function (ev, d) { if (!ev.active) simulation.alphaTarget(0); }));

      nodeSel.on("mouseover", function (ev, d) { showTip(tooltipHtml("node", d), ev); var nb = neighborsOf(d.id); dimExcept(nb, function (l) { return (l.source.id || l.source) === d.id || (l.target.id || l.target) === d.id; }); })
        .on("mousemove", function (ev) { moveTip(ev); })
        .on("mouseout", function () { hideTip(); undim(); })
        .on("click", function (ev, d) { if (onSelect) { ev.stopPropagation(); onSelect("node", d); } })
        .on("dblclick", function (ev, d) { d.fx = null; d.fy = null; if (simulation) simulation.alpha(0.3).restart(); });

      simulation = d3.forceSimulation(nodes)
        .force("link", d3.forceLink(links).id(function (d) { return d.id; }).distance(96).strength(0.55))
        .force("charge", d3.forceManyBody().strength(-340))
        .force("center", d3.forceCenter(W / 2, H / 2))
        .force("x", d3.forceX(W / 2).strength(0.07))
        .force("y", d3.forceY(H / 2).strength(0.07))
        .force("collide", d3.forceCollide(38))
        .on("tick", ticked)
        .on("end", fitToView);

      applyFilter();
      setTimeout(fitToView, 1400);
    }

    function load() {
      return getData().then(function (data) {
        var rawNodes = (data && data.nodes) || [];
        var rawEdges = (data && data.edges) || [];
        try { rawEdges.forEach(function (e, i) { console.log("edge[" + i + "] " + e.predicate + " -> category: " + e.category); }); } catch (e) {}
        var byId = {};
        nodes = rawNodes.map(function (n) { var o = { id: n.id, type: n.type, name: n.name, facts: n.facts || [] }; byId[o.id] = o; return o; });
        links = rawEdges.map(function (e) {
          return { source: e.source, target: e.target, predicate: e.predicate, category: e.category || "other", confidence: e.confidence, locked: !!e.locked };
        }).filter(function (l) { return byId[l.source] && byId[l.target]; });
        measure(build);
      });
    }

    if (global.ResizeObserver) {
      var ro = new ResizeObserver(function () {
        var w = svgEl.clientWidth, h = svgEl.clientHeight;
        if (w > 1 && h > 1 && simulation) {
          W = w; H = h;
          simulation.force("center", d3.forceCenter(W / 2, H / 2));
          simulation.force("x", d3.forceX(W / 2).strength(0.07));
          simulation.force("y", d3.forceY(H / 2).strength(0.07));
          simulation.alpha(0.2).restart();
          setTimeout(fitToView, 420);
        }
      });
      ro.observe(svgEl);
    }

    return {
      reload: load,
      refit: fitToView,
      stop: function () { if (simulation) simulation.stop(); },
      resume: function () { if (simulation && simulation.alpha() < 0.02) { simulation.alpha(0.05).restart(); } },
      getNodes: function () { return nodes; },
      getLinks: function () { return links; }
    };
  }

  global.initSageGraph = initSageGraph;
})(window);
</script>

<script>
(function(){
  var CFG={CHAT:'/api/chat',HISTORY:'/api/history',REFLECTIONS:'/reflections?n=12',FINDINGS:'/findings?n=12',STATUS:'/health',REFRESH_MS:15000};
  var $=function(id){return document.getElementById(id);};
  var messagesEl=$('messages'),inputEl=$('user-input'),sendBtn=$('send-btn');
  var sending=false,activeTab='reflections';var sageGraphCtl=null,sageGraphRefreshWired=false;
  var FENCE=String.fromCharCode(96,96,96);
  var codeRe=new RegExp(FENCE+'[\\w]*\\n?([\\s\\S]*?)'+FENCE,'g');

  function escapeHtml(t){return String(t).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');}
  function escapeAttr(t){return escapeHtml(t).replace(/"/g,'&quot;').replace(/'/g,'&#39;');}
  function renderMarkdown(text){
    var s=escapeHtml(text);
    s=s.replace(codeRe,function(_,c){return '<pre><code>'+c.replace(/\\s+$/,'')+'</code></pre>';});
    s=s.replace(/`([^`]+)`/g,'<code>$1</code>');
    s=s.replace(/\\*\\*([^*]+)\\*\\*/g,'<strong>$1</strong>');
    s=s.replace(/\\*([^*]+)\\*/g,'<em>$1</em>');
    s=s.replace(/\\n/g,'<br>');
    return s;
  }
  function scrollBottom(){messagesEl.scrollTop=messagesEl.scrollHeight;}
  function hideEmpty(){var e=$('empty');if(e)e.remove();}
  function addUser(text){hideEmpty();var m=document.createElement('div');m.className='msg user';var b=document.createElement('div');b.className='bubble';b.textContent=text;m.appendChild(b);messagesEl.appendChild(m);scrollBottom();}
  function addAi(){hideEmpty();var m=document.createElement('div');m.className='msg ai';var b=document.createElement('div');b.className='bubble';m.appendChild(b);messagesEl.appendChild(m);scrollBottom();return b;}
  function addThinking(){hideEmpty();var m=document.createElement('div');m.className='msg ai';m.id='thinking';var t=document.createElement('div');t.className='thinking';t.innerHTML='<span></span><span></span><span></span>';m.appendChild(t);messagesEl.appendChild(m);scrollBottom();}
  function rmThinking(){var e=$('thinking');if(e)e.remove();}
  function setSending(v){sending=v;sendBtn.disabled=v;}

  function msgNumId(id){var m=String(id||'').match(/_(\d+)$/);return m?parseInt(m[1],10):0;}
  function scrollNow(){messagesEl.scrollTo({top:messagesEl.scrollHeight,behavior:'auto'});}
  function nearBottom(){return messagesEl.scrollHeight-messagesEl.scrollTop-messagesEl.clientHeight<90;}
  function send(){
    var text=inputEl.value.trim();
    if(!text||sending)return;
    addUser(text);inputEl.value='';autoResize();addThinking();setSending(true);
    var bubble=null,acc='';
    function ensureBubble(){if(!bubble){rmThinking();bubble=addAi();bubble.classList.add('streaming');}}
    fetch(CFG.CHAT,{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({message:text})})
      .then(function(r){
        if(!r.ok)throw new Error('HTTP '+r.status);
        if(!r.body||!r.body.getReader)return r.text().then(function(t){acc=t;ensureBubble();bubble.innerHTML=renderMarkdown(acc);});
        var reader=r.body.getReader(),decoder=new TextDecoder();
        return (function pump(){return reader.read().then(function(res){
          if(res.done)return;
          var chunk=decoder.decode(res.value,{stream:true});
          if(chunk){var stick=nearBottom();ensureBubble();acc+=chunk;bubble.innerHTML=renderMarkdown(acc);if(stick)scrollNow();}
          return pump();
        });})();
      })
      .then(function(){rmThinking();if(!bubble){bubble=addAi();}bubble.classList.remove('streaming');if(acc&&acc.trim())bubble.innerHTML=renderMarkdown(acc);else bubble.textContent='(she went quiet)';})
      .catch(function(e){rmThinking();var b=bubble||addAi();b.className='bubble error';b.textContent='Could not reach Sage: '+e.message;})
      .then(function(){setSending(false);inputEl.focus();if(nearBottom())scrollBottom();refreshInnerHint();});
  }

  function loadHistory(){
    var clearedMarker=parseInt(localStorage.getItem('sage:chatClearedBefore')||'0',10);
    fetch(CFG.HISTORY).then(function(r){return r.ok?r.json():null;}).then(function(data){
      if(!data)return;var msgs=data.messages||[];if(!msgs.length)return;
      var shown=0;
      msgs.forEach(function(m){
        if(clearedMarker>0&&m.id&&msgNumId(m.id)<=clearedMarker)return;
        if(!shown)hideEmpty();shown++;
        if(m.role==='user'){addUser(m.content);if(m.id)messagesEl.lastElementChild.setAttribute('data-msg-id',m.id);}
        else{var b=addAi();b.innerHTML=renderMarkdown(m.content||'');if(m.id)messagesEl.lastElementChild.setAttribute('data-msg-id',m.id);}
      });
      if(shown>0)scrollBottom();
    }).catch(function(){});
  }

  function openDrawer(){$('drawer').classList.add('open');$('drawer-overlay').classList.add('show');markSeen();if(activeTab==='graph')showGraphTab();else loadTab(activeTab);}
  function closeDrawer(){$('drawer').classList.remove('open');$('drawer-overlay').classList.remove('show');if(sageGraphCtl)sageGraphCtl.stop();}
  function switchTab(tab){if(activeTab===tab)return;if(activeTab==='graph'&&sageGraphCtl)sageGraphCtl.stop();activeTab=tab;var t=document.querySelectorAll('.drawer-tab');for(var i=0;i<t.length;i++){t[i].classList.toggle('active',t[i].getAttribute('data-tab')===tab);}if(tab==='graph')showGraphTab();else{hideGraphTab();loadTab(tab);}}

  function pick(o,keys){for(var i=0;i<keys.length;i++){var k=keys[i];if(o&&o[k]!=null&&o[k]!=='')return o[k];}return null;}
  function fmtTime(v){if(v==null)return '';var d=(typeof v==='number')?new Date(v<1e12?v*1000:v):new Date(v);if(isNaN(d))return String(v);return d.toLocaleString([],{month:'short',day:'numeric',hour:'2-digit',minute:'2-digit'});}
  function normalizeList(data,keys){if(Array.isArray(data))return data;for(var i=0;i<keys.length;i++){if(data&&Array.isArray(data[keys[i]]))return data[keys[i]];}return [];}

  function loadTab(tab){
    var c=$('drawer-content'),note=$('drawer-note');var isRef=(tab==='reflections');
    note.textContent=isRef?'What she has turned over on her own. Read-only.':'What she went looking for, and found. Read-only.';
    fetch(isRef?CFG.REFLECTIONS:CFG.FINDINGS).then(function(r){if(!r.ok)throw new Error('HTTP '+r.status);return r.json();}).then(function(data){
      if(tab!==activeTab)return;
      var list=normalizeList(data,[tab,'memories','items','results','data']).slice().reverse();
      if(!list.length){c.innerHTML='<div class=\"drawer-empty\">Nothing yet. Leave her idle a while and she will wander.</div>';return;}
      c.innerHTML='';
      list.forEach(function(it){
        var ts=pick(it,['timestamp','created_at','created','time','ts','date']);
        var body=pick(it,['text','content','body','reflection','finding','query','summary','thought'])||(typeof it==='string'?it:JSON.stringify(it));
        var results=(it.results&&it.results.length)?it.results:null;
        var src=results?null:pick(it,['source','url','link','href']);
        var el=document.createElement('div');el.className='entry '+(isRef?'reflection':'finding');
        if(ts){var tsEl=document.createElement('div');tsEl.className='ts';tsEl.textContent=fmtTime(ts);el.appendChild(tsEl);}
        var bodyEl=document.createElement('div');bodyEl.className='body';bodyEl.textContent=body;el.appendChild(bodyEl);
        if(results||src){var srcEl=document.createElement('div');srcEl.className='src';
          if(results){srcEl.innerHTML=results.map(function(r){var u=r.url||r.link||r.href||'';var label=r.title||r.name||u;return u?'<a href=\"'+escapeAttr(u)+'\" target=\"_blank\" rel=\"noopener\">'+escapeHtml(label)+'</a>':escapeHtml(label);}).join(' &middot; ');}
          else{srcEl.innerHTML='<a href=\"'+escapeAttr(src)+'\" target=\"_blank\" rel=\"noopener\">'+escapeHtml(src)+'</a>';}
          el.appendChild(srcEl);}
        c.appendChild(el);
      });
    }).catch(function(e){if(tab!==activeTab)return;c.innerHTML='<div class=\"drawer-empty\">Cannot read her '+(isRef?'reflections':'findings')+' yet ('+e.message+').</div>';});
  }

  function latestTs(list){var max=0;list.forEach(function(it){var ts=pick(it,['timestamp','created_at','created','time','ts','date']);var d=(typeof ts==='number')?(ts<1e12?ts*1000:ts):Date.parse(ts);if(d&&d>max)max=d;});return max;}
  function refreshInnerHint(){fetch(CFG.REFLECTIONS).then(function(r){return r.ok?r.json():null;}).then(function(data){if(!data)return;var list=normalizeList(data,['reflections','memories','items','data']);if(!list.length)return;var latest=latestTs(list);var seen=parseInt(localStorage.getItem('sage_seen_ts')||'0',10);$('inner-toggle').classList.toggle('has-new',latest>seen);}).catch(function(){});}
  function markSeen(){fetch(CFG.REFLECTIONS).then(function(r){return r.ok?r.json():null;}).then(function(data){if(!data)return;var list=normalizeList(data,['reflections','memories','items','data']);localStorage.setItem('sage_seen_ts',String(latestTs(list)||Date.now()));$('inner-toggle').classList.remove('has-new');}).catch(function(){});}

  function setStatus(state){var d=$('status-dot');d.classList.remove('cold','down');if(state==='down'){d.classList.add('down');d.title='Problem reaching Sage';}else if(state==='cold'){d.classList.add('cold');d.title='Connecting';}else{d.title='Online';}}
  function checkStatus(){fetch(CFG.STATUS).then(function(r){if(r.status===404)throw{fb:true};if(!r.ok)throw{fb:false};return r.json().then(function(d){return d;},function(){return {};});}).then(function(d){if(d&&(d.ok===false||d.healthy===false||d.status==='error'||d.status==='down'))setStatus('down');else setStatus('ok');}).catch(function(e){if(e&&e.fb){fetch(CFG.HISTORY).then(function(r){setStatus(r.ok?'ok':'down');}).catch(function(){setStatus('down');});}else setStatus('down');});}

  function autoResize(){inputEl.style.height='auto';inputEl.style.height=Math.min(inputEl.scrollHeight,170)+'px';}

  sendBtn.addEventListener('click',send);
  inputEl.addEventListener('input',autoResize);
  inputEl.addEventListener('keydown',function(e){if(e.key==='Enter'&&(e.metaKey||e.ctrlKey)){e.preventDefault();send();}});
  function clearChat(){
    var newestKey=0,msgs=messagesEl.querySelectorAll('.msg[data-msg-id]');
    for(var i=0;i<msgs.length;i++){var k=msgNumId(msgs[i].getAttribute('data-msg-id'));if(k>newestKey)newestKey=k;}
    var prev=parseInt(localStorage.getItem('sage:chatClearedBefore')||'0',10);
    localStorage.setItem('sage:chatClearedBefore',String(Math.max(prev,newestKey,Date.now())));
    messagesEl.innerHTML='<div id="empty"><div id="empty-glyph">&#9671;</div><div id="empty-sub">Begin when you\'re ready.</div></div>';
  }
  $('clear-chat-btn').addEventListener('click',clearChat);
  $('inner-toggle').addEventListener('click',openDrawer);
  $('drawer-close').addEventListener('click',closeDrawer);
  $('drawer-overlay').addEventListener('click',closeDrawer);
  var tb=document.querySelectorAll('.drawer-tab');
  for(var i=0;i<tb.length;i++){(function(btn){btn.addEventListener('click',function(){switchTab(btn.getAttribute('data-tab'));});})(tb[i]);}

  loadHistory();checkStatus();refreshInnerHint();
  setInterval(function(){checkStatus();refreshInnerHint();if($('drawer').classList.contains('open')&&activeTab!=='graph')loadTab(activeTab);},CFG.REFRESH_MS);
  inputEl.focus();

  // ── Graph tab ──
  var REVIEW_CAT_COLORS={family:"#c98a6f",friend:"#8ca37e",romantic:"#c08aa0",colleague:"#7f93a8",acquaintance:"#9a8d86",creator:"#c2a15e",other:"#857c73"};
  var reviewState={state:'pending',category:'',min:'',max:'',endpoint:'',items:[]};
  var reviewOpen=false;
  function showGraphTab(){
    var gc=$('sg-inner-graph'),dc=$('drawer-content'),note=$('drawer-note'),ge=$('sg-graph-error');
    if(dc)dc.style.display='none';
    if(note)note.textContent='Entity graph of people, places, and projects. Click a node or edge to curate.';
    if(ge)ge.style.display='none';
    if(gc)gc.style.display='flex';
    if(!sageGraphCtl){
      if(!window.initSageGraph){if(ge){ge.style.display='flex';ge.textContent='Graph module failed to load.';}return;}
      sageGraphCtl=window.initSageGraph({
        svg:$('sg-graph-svg'),chips:$('sg-graph-chips'),tooltip:$('sg-graph-tooltip'),
        getData:function(){return fetch('/api/graph').then(function(r){if(!r.ok)throw new Error('HTTP '+r.status);return r.json();});},
        egoId:'person:elliot',
        onSelect:onGraphSelect
      });
      if(!sageGraphCtl){if(ge){ge.style.display='flex';ge.textContent='Graph needs D3 (offline?).';}return;}
      if(!sageGraphRefreshWired){
        var rb=$('sg-graph-refresh');if(rb){rb.addEventListener('click',function(){if(sageGraphCtl)sageGraphCtl.reload();refreshReview();});}
        wireReviewUI();
        sageGraphRefreshWired=true;
      }
      sageGraphCtl.reload().then(null,function(e){if(ge){ge.style.display='flex';ge.textContent='Cannot load graph: '+e.message;}});
      refreshReview();
    }else{
      sageGraphCtl.resume();sageGraphCtl.refit();
      refreshReview();
    }
  }
  function hideGraphTab(){
    var gc=$('sg-inner-graph'),dc=$('drawer-content');
    if(gc)gc.style.display='none';
    if(dc)dc.style.display='';
    if(sageGraphCtl)sageGraphCtl.stop();
    closeInspector();
    closeReview();
  }

  // ── Click-to-curate inspector ──
  var inspectorTarget=null; // {kind:'edge'|'node', data:..., links:[link...]}
  function onGraphSelect(kind,d){
    if(kind==='edge'){inspectorTarget={kind:'edge',data:d};}
    else{inspectorTarget={kind:'node',data:d};}
    renderInspector();
  }
  function renderInspector(){
    var el=$('sg-inspector');if(!el){return;}
    if(!inspectorTarget){closeInspector();return;}
    el.classList.add('open');
    if(inspectorTarget.kind==='edge'){renderInspectorEdge(el,inspectorTarget.data);}
    else{renderInspectorNode(el,inspectorTarget.data);}
  }
  function nameOf(n){return (n&&(n.name||n.id))||'';}
  function renderInspectorEdge(el,l){
    var srcName=nameOf(l.source);var tgtName=nameOf(l.target);
    var srcId=(l.source&&(l.source.id||l.source))||'';
    var tgtId=(l.target&&(l.target.id||l.target))||'';
    var rid=l.id||l.relation_id||'';
    var locked=l.locked?' <span style="color:var(--accent);">locked</span>':'';
    el.innerHTML=
      '<div class="sg-insp-head">Edge <span class="sg-insp-kind">'+escapeHtml(l.predicate||'')+'</span>'+
      '<button class="sg-insp-close" type="button" aria-label="Close">&#10005;</button></div>'+
      '<div class="sg-insp-body">'+
      '<div class="sg-insp-row"><span>from</span>'+escapeHtml(srcName)+'</div>'+
      '<div class="sg-insp-row"><span>to</span>'+escapeHtml(tgtName)+'</div>'+
      '<div class="sg-insp-row"><span>predicate</span>'+escapeHtml(l.predicate||'')+'</div>'+
      '<div class="sg-insp-row"><span>category</span>'+escapeHtml(l.category||'other')+'</div>'+
      '<div class="sg-insp-row"><span>confidence</span>'+(l.confidence!=null?Number(l.confidence).toFixed(2):'-')+locked+'</div>'+
      '<div class="sg-insp-row"><span>id</span><code style="font-size:10.5px;">'+escapeHtml(rid||'(none)')+'</code></div>'+
      '</div>'+
      '<div class="sg-insp-actions">'+
        '<button data-act="confirm"'+(rid?'':' disabled')+'>Confirm</button>'+
        '<button data-act="fix"'+(rid?'':' disabled')+'>Fix…</button>'+
        '<button class="sg-danger" data-act="delete"'+(rid?'':' disabled')+'>Delete</button>'+
      '</div>'+
      '<div class="sg-insp-fix" data-fix>'+
        '<input data-fix-pred placeholder="predicate" value="'+escapeAttr(l.predicate||'')+'">'+
        '<select data-fix-kind>'+
          '<option value="entity">entity</option>'+
          '<option value="literal">literal</option>'+
        '</select>'+
        '<input data-fix-val placeholder="object id or value" value="'+escapeAttr(tgtId)+'">'+
        '<button data-act="fix-go">Save</button>'+
        '<button data-act="fix-cancel">Cancel</button>'+
      '</div>'+
      '<div class="sg-insp-status" data-status></div>';
    bindInspector(el,{kind:'edge',id:rid,subject_id:srcId,predicate:l.predicate,object_value:tgtId,object_kind:'entity'});
  }
  function renderInspectorNode(el,d){
    var facts=d.facts||[];
    var factRows=facts.map(function(f){
      var rid=f.relation_id||'';
      return '<div class="sg-insp-row" data-fact-row data-rid="'+escapeAttr(rid)+'" data-pred="'+escapeAttr(f.predicate||'')+'" data-val="'+escapeAttr(String(f.value==null?'':f.value))+'">'+
        '<span>'+escapeHtml(f.predicate||'')+'</span>'+escapeHtml(String(f.value==null?'':f.value))+
        (f.locked?' <span style="color:var(--accent);font-size:10px;">locked</span>':'')+
        ' &middot; <a href="#" data-act="fact-confirm" data-rid="'+escapeAttr(rid)+'" style="color:var(--muted);">confirm</a>'+
        ' &middot; <a href="#" data-act="fact-delete" data-rid="'+escapeAttr(rid)+'" style="color:var(--muted);">delete</a>'+
        '</div>';
    }).join('');
    el.innerHTML=
      '<div class="sg-insp-head">'+escapeHtml(d.name||d.id||'')+' <span class="sg-insp-kind">'+escapeHtml(d.type||'')+'</span>'+
      '<button class="sg-insp-close" type="button" aria-label="Close">&#10005;</button></div>'+
      '<div class="sg-insp-body">'+
      '<div class="sg-insp-row"><span>id</span><code style="font-size:10.5px;">'+escapeHtml(d.id||'')+'</code></div>'+
      (factRows||'<div class="sg-insp-row" style="color:var(--faint);">no literal facts</div>')+
      '</div>'+
      '<div class="sg-insp-status" data-status>Node deletion is out of scope. Use edge actions or the fact links above.</div>';
    bindInspectorNode(el);
  }
  function bindInspector(el,ctx){
    var close=el.querySelector('.sg-insp-close');if(close)close.addEventListener('click',closeInspector);
    var status=el.querySelector('[data-status]');
    function setStatus(txt,err){if(!status)return;status.textContent=txt||'';status.classList.toggle('err',!!err);}
    function disableAll(v){var bs=el.querySelectorAll('button');for(var i=0;i<bs.length;i++)bs[i].disabled=v;}
    el.querySelectorAll('.sg-insp-actions button').forEach(function(b){
      b.addEventListener('click',function(){
        var act=b.getAttribute('data-act');
        if(act==='confirm'){
          disableAll(true);setStatus('Confirming…');
          postWrite('/api/graph/confirm',{relation_id:ctx.id,subject_id:ctx.subject_id,predicate:ctx.predicate,object_value:ctx.object_value,object_kind:ctx.object_kind})
            .then(function(j){if(j&&j.ok){setStatus('Confirmed.');refreshAll();closeInspector();}else{setStatus((j&&j.error)||'Failed.',true);disableAll(false);}})
            .catch(function(e){setStatus(e.message,true);disableAll(false);});
        }else if(act==='delete'){
          disableAll(true);setStatus('Deleting…');
          postWrite('/api/graph/delete',{relation_id:ctx.id})
            .then(function(j){if(j&&j.ok){setStatus('Deleted.');refreshAll();closeInspector();}else{setStatus((j&&j.error)||'Failed.',true);disableAll(false);}})
            .catch(function(e){setStatus(e.message,true);disableAll(false);});
        }else if(act==='fix'){
          var fix=el.querySelector('[data-fix]');if(fix)fix.classList.add('show');
        }
      });
    });
    var fixGo=el.querySelector('[data-act="fix-go"]');
    if(fixGo){fixGo.addEventListener('click',function(){
      var pred=el.querySelector('[data-fix-pred]').value.trim();
      var kind=el.querySelector('[data-fix-kind]').value;
      var val=el.querySelector('[data-fix-val]').value.trim();
      if(!val){setStatus('object_value required',true);return;}
      disableAll(true);setStatus('Saving fix…');
      postWrite('/api/graph/fix',{relation_id:ctx.id,new_predicate:pred||null,new_object_value:val,new_object_kind:kind})
        .then(function(j){if(j&&j.ok){setStatus('Fixed.');refreshAll();closeInspector();}else{setStatus((j&&j.error)||'Failed.',true);disableAll(false);}})
        .catch(function(e){setStatus(e.message,true);disableAll(false);});
    });}
    var fixCancel=el.querySelector('[data-act="fix-cancel"]');
    if(fixCancel){fixCancel.addEventListener('click',function(){var fix=el.querySelector('[data-fix]');if(fix)fix.classList.remove('show');});}
  }
  function bindInspectorNode(el){
    var close=el.querySelector('.sg-insp-close');if(close)close.addEventListener('click',closeInspector);
    el.querySelectorAll('[data-act="fact-confirm"],[data-act="fact-delete"]').forEach(function(a){
      a.addEventListener('click',function(ev){
        ev.preventDefault();
        var act=a.getAttribute('data-act');
        var rid=a.getAttribute('data-rid');
        if(!rid)return;
        var url=act==='fact-confirm'?'/api/graph/confirm':'/api/graph/delete';
        postWrite(url,{relation_id:rid}).then(function(j){
          if(j&&j.ok){refreshAll();closeInspector();}
        }).catch(function(){});
      });
    });
  }
  function closeInspector(){var el=$('sg-inspector');if(el){el.classList.remove('open');el.innerHTML='';}inspectorTarget=null;}

  // ── Review queue ──
  function wireReviewUI(){
    var toggle=$('sg-review-toggle');if(toggle){toggle.addEventListener('click',function(){if(reviewOpen)closeReview();else openReview();});}
    var close=$('sg-review-close');if(close){close.addEventListener('click',closeReview);}
    var tabs=document.querySelectorAll('.sg-rev-tab');for(var i=0;i<tabs.length;i++){(function(t){t.addEventListener('click',function(){reviewState.state=t.getAttribute('data-state');for(var k=0;k<tabs.length;k++)tabs[k].classList.toggle('active',tabs[k]===t);refreshReview();});})(tabs[i]);}
    var cat=$('sg-review-cat'),min=$('sg-review-min'),max=$('sg-review-max'),end=$('sg-review-endp');
    [cat,min,max,end].forEach(function(inp){if(!inp)return;inp.addEventListener('change',readFilters);inp.addEventListener('input',function(){clearTimeout(inp._t);inp._t=setTimeout(readFilters,260);});});
  }
  function readFilters(){
    reviewState.category=($('sg-review-cat')||{}).value||'';
    reviewState.min=($('sg-review-min')||{}).value||'';
    reviewState.max=($('sg-review-max')||{}).value||'';
    reviewState.endpoint=($('sg-review-endp')||{}).value||'';
    refreshReview();
  }
  function openReview(){reviewOpen=true;$('sg-review').classList.add('open');$('sg-review-toggle').classList.add('on');refreshReview();}
  function closeReview(){reviewOpen=false;var rv=$('sg-review'),tg=$('sg-review-toggle');if(rv)rv.classList.remove('open');if(tg)tg.classList.remove('on');}
  function buildReviewUrl(){
    var q=['state='+encodeURIComponent(reviewState.state||'pending')];
    if(reviewState.category)q.push('category='+encodeURIComponent(reviewState.category));
    var mn=parseFloat(reviewState.min);if(!isNaN(mn))q.push('min_confidence='+mn);
    var mx=parseFloat(reviewState.max);if(!isNaN(mx))q.push('max_confidence='+mx);
    if(reviewState.endpoint)q.push('endpoint='+encodeURIComponent(reviewState.endpoint));
    return '/api/graph/review?'+q.join('&');
  }
  function refreshReview(){
    fetch(buildReviewUrl()).then(function(r){if(!r.ok)throw new Error('HTTP '+r.status);return r.json();}).then(function(data){
      var items=(data&&data.items)||[];reviewState.items=items;
      populateCategorySelect(items);
      var badge=$('sg-review-badge');if(badge)badge.textContent=String(items.length);
      var list=$('sg-review-list');if(!list)return;
      if(!items.length){list.innerHTML='<div class="sg-rev-empty">Nothing '+escapeHtml(reviewState.state||'pending')+' right now.</div>';return;}
      list.innerHTML=items.map(function(it){
        var color=REVIEW_CAT_COLORS[it.category]||REVIEW_CAT_COLORS.other;
        var conf=(it.confidence!=null?Number(it.confidence).toFixed(2):'-');
        var pendingState=(reviewState.state==='pending');
        return '<div class="sg-rev-item" data-rid="'+escapeAttr(it.id||'')+'">'+
          '<div class="sg-rev-edge"><strong>'+escapeHtml(it.subject_name||it.source||'')+'</strong> <span class="sg-rev-pred">'+escapeHtml(it.predicate||'')+'</span> '+escapeHtml(it.object_name||it.object_value||'')+'</div>'+
          '<div class="sg-rev-meta"><span class="sg-rev-cat" style="background:'+color+'"></span>'+escapeHtml(it.category||'other')+' &middot; conf '+conf+' &middot; '+escapeHtml(it.origin||'')+'</div>'+
          (pendingState?'<div class="sg-rev-actions">'+
            '<button data-act="rev-confirm" data-rid="'+escapeAttr(it.id||'')+'">Confirm</button>'+
            '<button class="sg-danger" data-act="rev-dismiss" data-rid="'+escapeAttr(it.id||'')+'">Dismiss</button>'+
          '</div>':'')+
        '</div>';
      }).join('');
      list.querySelectorAll('.sg-rev-item').forEach(function(row){
        row.addEventListener('click',function(ev){
          if(ev.target.closest('button'))return;
          // Open the inspector for this id by faking a selected edge from the item.
          var rid=row.getAttribute('data-rid');var it=null;for(var k=0;k<items.length;k++)if(items[k].id===rid){it=items[k];break;}
          if(!it)return;
          inspectorTarget={kind:'edge',data:{
            id:it.id,
            source:{id:it.source,name:it.subject_name},
            target:{id:it.target,name:it.object_name},
            predicate:it.predicate,category:it.category,confidence:it.confidence,locked:false
          }};
          renderInspector();
        });
      });
      list.querySelectorAll('[data-act="rev-confirm"]').forEach(function(b){
        b.addEventListener('click',function(ev){ev.stopPropagation();var rid=b.getAttribute('data-rid');b.disabled=true;postWrite('/api/graph/confirm',{relation_id:rid}).then(function(j){if(j&&j.ok)refreshAll();else b.disabled=false;}).catch(function(){b.disabled=false;});});
      });
      list.querySelectorAll('[data-act="rev-dismiss"]').forEach(function(b){
        b.addEventListener('click',function(ev){ev.stopPropagation();var rid=b.getAttribute('data-rid');b.disabled=true;postWrite('/api/graph/delete',{relation_id:rid}).then(function(j){if(j&&j.ok)refreshAll();else b.disabled=false;}).catch(function(){b.disabled=false;});});
      });
    }).catch(function(e){var list=$('sg-review-list');if(list)list.innerHTML='<div class="sg-rev-empty">Cannot load review queue ('+escapeHtml(e.message)+').</div>';});
  }
  function populateCategorySelect(items){
    var sel=$('sg-review-cat');if(!sel)return;
    var seen={};items.forEach(function(it){if(it.category)seen[it.category]=true;});
    var cats=Object.keys(seen).sort();
    var current=sel.value;
    sel.innerHTML='<option value="">all cats</option>'+cats.map(function(c){return '<option value="'+escapeAttr(c)+'"'+(c===current?' selected':'')+'>'+escapeHtml(c)+'</option>';}).join('');
  }
  function postWrite(url,body){
    return fetch(url,{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify(body||{})}).then(function(r){return r.json();});
  }
  function refreshAll(){if(sageGraphCtl){sageGraphCtl.reload();}refreshReview();}
})();
</script>
</body>
</html>
